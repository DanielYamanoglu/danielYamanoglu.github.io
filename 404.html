<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<title>404 — Daniel Yamanoğlu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#08080a;color:#c8c8d0;
  font-family:"JetBrains Mono",ui-monospace,monospace;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;text-align:center;line-height:1.6
}
.wrap{max-width:520px}
.code{font-size:clamp(64px,14vw,128px);font-weight:700;color:#5fcf80;letter-spacing:-4px;line-height:1;margin-bottom:12px}
.title{font-family:"Inter",system-ui,sans-serif;color:#ededed;font-size:22px;font-weight:600;margin-bottom:16px;letter-spacing:-.4px}
.msg{color:#7a7a85;font-size:14px;margin-bottom:32px}
.btn{display:inline-block;padding:12px 22px;border:1px solid #5fcf80;border-radius:8px;
  color:#5fcf80;text-decoration:none;font-size:13px;transition:.16s;background:rgba(95,207,128,.1)}
.btn:hover{background:#5fcf80;color:#08080a}
.btn .a{color:#4a4a55;margin-right:6px}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <div class="title">Signal lost in the network</div>
  <div class="msg">The page you're looking for doesn't exist or has been moved.<br/>Let's get you back on the path.</div>
  <a href="/" class="btn"><span class="a">/</span>return home <span style="margin-left:6px">→</span></a>
</div>
</body>
</html>
